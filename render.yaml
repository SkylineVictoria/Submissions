# Render Blueprint - PDF Server
# Deploy: New → Blueprint → Connect repo → select this file
#
# PDF generation uses Playwright/Chromium (~300MB+). Queue + browser reuse help on 512MB Starter.
services:
  - type: web
    name: signflow-pdf
    rootDir: pdf-server
    env: docker
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NODE_OPTIONS
        value: --max-old-space-size=256
